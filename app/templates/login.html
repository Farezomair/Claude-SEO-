{% extends "base.html" %}
{% block title %}Log in &middot; SEO Agent System{% endblock %}
{% block body %}
<div class="container" style="max-width: 380px; margin-top: 8vh;">
  <h1>SEO Agent System</h1>
  <p class="muted" style="margin-top:0;">Sign in to manage your sites.</p>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      <button class="btn" type="submit" style="width:100%;">Log in</button>
    </form>
  </div>
</div>
{% endblock %}
