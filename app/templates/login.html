{% extends "base.html" %}
{% block title %}Log in &middot; Ascend{% endblock %}
{% block body %}
<div class="container" style="max-width: 400px; margin-top: 12vh;">
  <div style="text-align:center; margin-bottom:24px;">
    <span class="logo-dot" style="width:44px; height:44px; border-radius:13px; margin-bottom:14px;"></span>
    <h1 style="margin-bottom:4px;"><span class="wordmark">Ascend</span></h1>
    <p class="muted" style="margin-top:0;">Your self-running SEO crew. Sign in to continue.</p>
  </div>
  <div class="card">
    {% if error %}<div class="notice notice-danger">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      <button class="btn" type="submit" style="width:100%; justify-content:center;">Log in</button>
    </form>
  </div>
</div>
{% endblock %}
