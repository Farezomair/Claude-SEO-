<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SEO Agent System{% endblock %}</title>
  {% block head %}{% endblock %}
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel-2: #1f232c;
      --border: #2a2f3a;
      --text: #e6e8ec;
      --muted: #9aa3b2;
      --accent: #4f8cff;
      --accent-hover: #3d7bf0;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header.topbar .brand { font-weight: 600; font-size: 16px; }
    header.topbar .brand a { color: var(--text); }
    .container { max-width: 880px; margin: 0 auto; padding: 32px 24px; }
    .muted { color: var(--muted); }
    .btn {
      display: inline-block; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px;
      font-weight: 500; cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: var(--accent-hover); text-decoration: none; }
    .btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
    input[type="text"], input[type="password"], input[type="url"] {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--panel-2);
      color: var(--text); font-size: 14px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .field { margin-bottom: 16px; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .error { color: var(--danger); font-size: 14px; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 13px; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin: 20px 0 24px; }
    .tabs a {
      padding: 10px 16px; color: var(--muted); border-bottom: 2px solid transparent;
    }
    .tabs a.active { color: var(--text); border-bottom-color: var(--accent); }
    .tabs a:hover { text-decoration: none; color: var(--text); }
    .empty {
      text-align: center; padding: 48px 24px; color: var(--muted);
      border: 1px dashed var(--border); border-radius: 12px;
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    h2 { font-size: 16px; margin: 0 0 16px; }
  </style>
</head>
<body>
  {% if user %}
  <header class="topbar">
    <div class="brand"><a href="/sites">SEO Agent System</a></div>
    <div class="muted">
      <a href="/approvals">Approvals{% if pending_count is defined and pending_count > 0 %} ({{ pending_count }}){% endif %}</a>
      &middot; {{ user }} &middot; <a href="/logout">Log out</a>
    </div>
  </header>
  {% endif %}
  {% block body %}{% endblock %}
</body>
</html>
