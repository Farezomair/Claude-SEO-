<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SEO Agent System{% endblock %}</title>
  {% block head %}{% endblock %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d12;
      --bg-grad: radial-gradient(1200px 600px at 80% -10%, #1a2440 0%, rgba(11,13,18,0) 55%), var(--bg);
      --panel: #14171f;
      --panel-2: #1b1f29;
      --panel-3: #20252f;
      --border: #272c38;
      --border-soft: #1f232d;
      --text: #eef1f6;
      --muted: #9aa3b4;
      --muted-2: #6b7280;
      --accent: #5b8cff;
      --accent-2: #7c5cff;
      --accent-hover: #4a7bf0;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --radius: 14px;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-grad);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    a { color: var(--accent); text-decoration: none; transition: color .15s; }
    a:hover { color: #8db0ff; }

    /* Top bar */
    header.topbar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: rgba(16,19,26,.82);
      backdrop-filter: saturate(160%) blur(12px);
      border-bottom: 1px solid var(--border-soft);
    }
    header.topbar .brand { font-weight: 700; font-size: 15px; letter-spacing: -0.02em; display:flex; align-items:center; gap:10px; }
    header.topbar .brand a { color: var(--text); }
    .logo-dot { width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display:inline-block; box-shadow: 0 0 16px rgba(91,140,255,.5); }
    .nav { display: flex; align-items: center; gap: 6px; font-size: 14px; }
    .nav a.navlink { color: var(--muted); padding: 7px 12px; border-radius: 9px; transition: all .15s; }
    .nav a.navlink:hover { color: var(--text); background: var(--panel-2); }
    .nav .userchip { color: var(--muted-2); font-size: 13px; padding-left: 8px; border-left: 1px solid var(--border); margin-left: 4px; }
    .nav .pill-count { display:inline-block; min-width:18px; text-align:center; background: var(--accent); color:#fff; border-radius: 999px; padding: 0 6px; font-size: 12px; font-weight:600; margin-left:4px; }

    /* Layout */
    .container { max-width: 940px; margin: 0 auto; padding: 36px 28px 80px; }
    h1 { font-size: 26px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.02em; }
    h2 { font-size: 16px; font-weight: 600; margin: 0 0 14px; }
    h3 { font-size: 14px; font-weight: 600; margin: 18px 0 8px; color: var(--text); }
    .muted { color: var(--muted); }

    /* Cards */
    .card {
      background: linear-gradient(180deg, var(--panel) 0%, #12151c 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(180deg, var(--accent), var(--accent-hover));
      color: #fff; border: none; border-radius: 10px;
      padding: 10px 18px; font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: transform .12s, box-shadow .2s, opacity .2s;
      box-shadow: 0 2px 8px rgba(74,123,240,.35);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(74,123,240,.45); color:#fff; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn.secondary { background: var(--panel-3); color: var(--text); border: 1px solid var(--border); box-shadow: none; }
    .btn.secondary:hover { background: #262c38; color: var(--text); }
    .btn.danger { background: linear-gradient(180deg, #ef5a5a, #e04848); box-shadow: 0 2px 8px rgba(224,72,72,.3); }
    .btn.small { padding: 7px 13px; font-size: 13px; }

    /* Forms */
    input[type="text"], input[type="password"], input[type="url"], textarea {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: #0f1219;
      color: var(--text); font-size: 14px; font-family: inherit; transition: border-color .15s, box-shadow .15s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,140,255,.18); }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 7px; }
    .field { margin-bottom: 18px; }
    .error { color: var(--danger); font-size: 14px; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 13px 16px; border-bottom: 1px solid var(--border-soft); vertical-align: top; }
    th { color: var(--muted-2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    tbody tr { transition: background .12s; }
    tbody tr:hover { background: rgba(255,255,255,.02); }
    tbody tr:last-child td { border-bottom: none; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin: 24px 0 26px; flex-wrap: wrap; }
    .tabs a { padding: 11px 16px; color: var(--muted); border-bottom: 2px solid transparent; font-weight: 500; font-size: 14px; transition: all .15s; }
    .tabs a.active { color: var(--text); border-bottom-color: var(--accent); }
    .tabs a:hover { color: var(--text); }

    /* Badges */
    .badge { display: inline-flex; align-items:center; gap:5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; letter-spacing: .01em; text-transform: capitalize; }
    .badge::before { content:''; width:6px; height:6px; border-radius:50%; background: currentColor; }
    .badge-success { background: rgba(52,211,153,.14); color: #4ade80; }
    .badge-warning { background: rgba(251,191,36,.14); color: #fbbf24; }
    .badge-danger  { background: rgba(248,113,113,.14); color: #f87171; }
    .badge-neutral { background: rgba(154,163,180,.14); color: #aab2c2; }
    .badge-info    { background: rgba(91,140,255,.14); color: #7ea2ff; }

    /* Empty state */
    .empty { text-align: center; padding: 44px 24px; color: var(--muted); border: 1px dashed var(--border); border-radius: var(--radius); background: rgba(255,255,255,.012); }

    /* Notice banners */
    .notice { border-radius: 12px; padding: 13px 16px; margin-bottom: 16px; font-size: 14px; border: 1px solid var(--border); }
    .notice-success { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.3); color: #6ee7b7; }
    .notice-danger { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: #fca5a5; }
    .notice-muted { background: var(--panel-2); color: var(--muted); }

    .row-between { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap: wrap; }
  </style>
</head>
<body>
  {% if user %}
  <header class="topbar">
    <div class="brand"><span class="logo-dot"></span><a href="/sites">SEO Agent</a></div>
    <nav class="nav">
      <a class="navlink" href="/sites">Websites</a>
      <a class="navlink" href="/rules">Rules</a>
      <a class="navlink" href="/approvals">Approvals{% if pending_count is defined and pending_count > 0 %}<span class="pill-count">{{ pending_count }}</span>{% endif %}</a>
      <span class="userchip">{{ user }} &middot; <a href="/logout">Log out</a></span>
    </nav>
  </header>
  {% endif %}
  {% block body %}{% endblock %}
</body>
</html>
{# Badge helper: usage {{ status | badge }} #}
