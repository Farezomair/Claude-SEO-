<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ascend{% endblock %}</title>
  {% block head %}{% endblock %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07080c;
      --panel: rgba(20, 23, 32, 0.72);
      --panel-solid: #141720;
      --panel-2: #1a1e29;
      --panel-3: #222734;
      --border: #262b38;
      --border-soft: #1c2029;
      --text: #f4f6fb;
      --muted: #99a2b5;
      --muted-2: #69718a;
      --accent: #2dd4bf;       /* teal */
      --accent-2: #818cf8;     /* indigo */
      --accent-3: #c084fc;     /* violet */
      --accent-grad: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 50%, #818cf8 100%);
      --accent-hover: #2bbfad;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #fb7185;
      --radius: 16px;
      --shadow: 0 1px 2px rgba(0,0,0,.5), 0 12px 40px rgba(0,0,0,.35);
      --glow: 0 0 0 1px rgba(45,212,191,.0), 0 8px 30px rgba(45,212,191,.18);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.011em;
      min-height: 100vh;
    }
    /* Aurora overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(900px 520px at 12% -8%, rgba(45,212,191,.16), transparent 60%),
        radial-gradient(820px 520px at 92% 8%, rgba(129,140,248,.16), transparent 58%),
        radial-gradient(700px 600px at 70% 100%, rgba(192,132,252,.10), transparent 60%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .5;
      background-image: radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(ellipse at 50% 0%, #000 0%, transparent 70%);
    }
    a { color: var(--accent); text-decoration: none; transition: color .15s; }
    a:hover { color: #5eead4; }

    /* Top bar */
    header.topbar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 30px;
      background: rgba(10, 12, 17, 0.7);
      backdrop-filter: saturate(170%) blur(16px);
      -webkit-backdrop-filter: saturate(170%) blur(16px);
      border-bottom: 1px solid var(--border-soft);
    }
    .brand { display:flex; align-items:center; gap:11px; font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:18px; letter-spacing:-0.02em; }
    .brand .wordmark { background: var(--accent-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .brand a { color: inherit; }
    .logo-dot {
      width: 26px; height: 26px; border-radius: 9px;
      background: var(--accent-grad);
      box-shadow: 0 0 22px rgba(45,212,191,.55);
      display:inline-block; position:relative;
    }
    .logo-dot::after { content:''; position:absolute; inset:6px; border-radius:4px; background: rgba(7,8,12,.85); }
    .nav { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight:500; }
    .nav a.navlink { color: var(--muted); padding: 8px 13px; border-radius: 10px; transition: all .15s; }
    .nav a.navlink:hover { color: var(--text); background: var(--panel-2); }
    .nav .userchip { color: var(--muted-2); font-size: 13px; padding-left: 10px; border-left: 1px solid var(--border); margin-left: 4px; }
    .nav .pill-count { display:inline-block; min-width:18px; text-align:center; background: var(--accent-grad); color:#04201c; border-radius: 999px; padding: 1px 7px; font-size: 12px; font-weight:700; margin-left:5px; }

    /* Layout */
    .container { max-width: 960px; margin: 0 auto; padding: 40px 30px 90px; }
    h1 { font-family:'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.025em; }
    h2 { font-family:'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; margin: 0 0 14px; }
    h3 { font-size: 14px; font-weight: 700; margin: 18px 0 8px; }
    .muted { color: var(--muted); }

    /* Cards */
    .card {
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent-grad); color: #052420;
      border: none; border-radius: 11px;
      padding: 11px 20px; font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: transform .12s, box-shadow .2s, filter .2s;
      box-shadow: 0 4px 18px rgba(45,212,191,.32);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(45,212,191,.45); filter: brightness(1.05); color:#052420; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn.secondary { background: var(--panel-3); color: var(--text); border: 1px solid var(--border); box-shadow: none; }
    .btn.secondary:hover { background: #2a3040; filter:none; color: var(--text); }
    .btn.danger { background: linear-gradient(135deg, #fb7185, #f43f5e); color:#fff; box-shadow: 0 4px 18px rgba(244,63,94,.3); }
    .btn.small { padding: 7px 13px; font-size: 13px; border-radius: 9px; }

    /* Forms */
    input[type="text"], input[type="password"], input[type="url"], textarea {
      width: 100%; padding: 12px 15px; border-radius: 11px;
      border: 1px solid var(--border); background: rgba(8,10,14,.6);
      color: var(--text); font-size: 14px; font-family: inherit; transition: border-color .15s, box-shadow .15s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,212,191,.2); }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
    .field { margin-bottom: 18px; }
    .error { color: var(--danger); font-size: 14px; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--border-soft); vertical-align: top; }
    th { color: var(--muted-2); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .07em; }
    tbody tr { transition: background .12s; }
    tbody tr:hover { background: rgba(45,212,191,.04); }
    tbody tr:last-child td { border-bottom: none; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin: 26px 0 28px; flex-wrap: wrap; }
    .tabs a { padding: 12px 16px; color: var(--muted); border-bottom: 2px solid transparent; font-weight: 600; font-size: 14px; transition: all .15s; }
    .tabs a.active { color: var(--text); border-bottom-color: var(--accent); }
    .tabs a:hover { color: var(--text); }

    /* Badges */
    .badge { display: inline-flex; align-items:center; gap:6px; padding: 3px 11px; border-radius: 999px; font-size: 12px; font-weight: 700; letter-spacing: .01em; text-transform: capitalize; }
    .badge::before { content:''; width:6px; height:6px; border-radius:50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
    .badge-success { background: rgba(52,211,153,.14); color: #4ade80; }
    .badge-warning { background: rgba(251,191,36,.14); color: #fbbf24; }
    .badge-danger  { background: rgba(251,113,133,.15); color: #fb7185; }
    .badge-neutral { background: rgba(153,162,181,.14); color: #aab2c2; }
    .badge-info    { background: rgba(45,212,191,.14); color: #2dd4bf; }

    /* Empty state */
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); border: 1px dashed var(--border); border-radius: var(--radius); background: rgba(255,255,255,.015); }

    /* Notice banners */
    .notice { border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; font-size: 14px; border: 1px solid var(--border); }
    .notice-success { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.3); color: #6ee7b7; }
    .notice-danger { background: rgba(251,113,133,.1); border-color: rgba(251,113,133,.3); color: #fda4af; }
    .notice-muted { background: var(--panel-2); color: var(--muted); }

    .row-between { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap: wrap; }

    /* ── Command Center ── */
    .cc-grid { display:grid; grid-template-columns: 256px 1fr; gap:20px; align-items:start; }
    @media (max-width: 860px){ .cc-grid{ grid-template-columns:1fr; } }
    .cc-side { position:sticky; top:84px; }
    @media (max-width: 860px){ .cc-side{ position:static; } }
    .crew-group + .crew-group { margin-top:16px; padding-top:14px; border-top:1px solid var(--border-soft); }
    .crew-h { font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted-2); font-weight:700; margin:0 0 8px; }
    .crew-item { display:flex; align-items:center; gap:11px; padding:8px 9px; border-radius:10px; transition:background .15s; }
    .crew-item:hover { background:var(--panel-2); }
    .crew-item .dot { width:9px; height:9px; border-radius:50%; background:var(--muted-2); flex-shrink:0; transition:all .2s; }
    .crew-item.working .dot { background:var(--accent); box-shadow:0 0 10px var(--accent); animation:cc-pulse 1.2s infinite; }
    .crew-item.working { background: rgba(45,212,191,.06); }
    .crew-item.done .dot { background:var(--success); box-shadow:0 0 8px var(--success); }
    .crew-item .nm { font-size:13.5px; font-weight:600; line-height:1.25; }
    .crew-item .role { font-size:11.5px; color:var(--muted-2); }
    @keyframes cc-pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }

    .cc-hero { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
    .pipeline { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
    @media (max-width: 680px){ .pipeline{ grid-template-columns:1fr 1fr; } }
    .stage { background:var(--panel-2); border:1px solid var(--border); border-radius:14px; padding:15px 15px 16px; position:relative; overflow:hidden; transition:border-color .25s, transform .2s, box-shadow .25s; }
    .stage.active { border-color:rgba(45,212,191,.55); box-shadow:var(--glow); transform:translateY(-2px); }
    .stage.done { border-color:rgba(52,211,153,.35); }
    .stage.failed { border-color:rgba(251,113,133,.5); }
    .stage .ico { font-size:21px; }
    .stage .st-title { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; margin-top:7px; }
    .stage .st-sub { font-size:11.5px; color:var(--muted-2); min-height:15px; margin-top:1px; }
    .stage .st-state { position:absolute; top:13px; right:14px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--muted-2); }
    .stage.active .st-state { color:var(--accent); }
    .stage.done .st-state { color:var(--success); }
    .stage.failed .st-state { color:var(--danger); }
    .bar { height:6px; border-radius:6px; background:rgba(255,255,255,.07); margin-top:12px; overflow:hidden; }
    .bar > i { display:block; height:100%; width:0%; border-radius:6px; background:var(--accent-grad); transition:width .6s ease; }
    .stage.done .bar > i { width:100%; background:linear-gradient(135deg,#34d399,#2dd4bf); }
    .stage.active .bar > i { width:100%; background:linear-gradient(90deg, rgba(45,212,191,0) 0%, var(--accent) 50%, rgba(45,212,191,0) 100%); background-size:200% 100%; animation:cc-flow 1.1s linear infinite; }
    .stage.failed .bar > i { width:100%; background:var(--danger); }
    @keyframes cc-flow { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

    .cc-stat { display:flex; gap:30px; margin-top:20px; }
    .cc-stat .n { font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; line-height:1; }
    .cc-stat .l { font-size:11px; color:var(--muted-2); text-transform:uppercase; letter-spacing:.06em; margin-top:5px; }

    /* ── Health score ── */
    .score-ring { width:118px; height:118px; border-radius:50%; flex-shrink:0; --ring:var(--accent);
      display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative;
      background: conic-gradient(var(--ring) calc(var(--p,0)*1%), rgba(255,255,255,.07) 0); }
    .score-ring::before { content:''; position:absolute; inset:9px; border-radius:50%; background:var(--panel-solid); }
    .score-num { position:relative; z-index:1; font-family:'Space Grotesk',sans-serif; font-size:36px; font-weight:700; line-height:1; }
    .score-lbl { position:relative; z-index:1; font-size:11px; color:var(--muted-2); margin-top:2px; }
    .grade-chip { display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:30px; padding:0 9px;
      border-radius:9px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; color:#04201c; }
    .grade-A,.grade-A.score-ring{--ring:#34d399} .grade-A.grade-chip{background:#34d399}
    .grade-B,.grade-B.score-ring{--ring:#4ade80} .grade-B.grade-chip{background:#4ade80}
    .grade-C,.grade-C.score-ring{--ring:#fbbf24} .grade-C.grade-chip{background:#fbbf24;color:#3a2c05}
    .grade-D,.grade-D.score-ring{--ring:#fb923c} .grade-D.grade-chip{background:#fb923c;color:#3a1c05}
    .grade-F,.grade-F.score-ring{--ring:#fb7185} .grade-F.grade-chip{background:#fb7185;color:#3a0512}
    .cat-bars { margin-top:12px; display:flex; flex-direction:column; gap:7px; }
    .cat-row { display:grid; grid-template-columns:140px 1fr 30px; align-items:center; gap:10px; font-size:12.5px; }
    @media (max-width:520px){ .cat-row{ grid-template-columns:110px 1fr 28px; } }
    .cat-name { color:var(--muted); }
    .cat-track { height:7px; background:rgba(255,255,255,.07); border-radius:5px; overflow:hidden; }
    .cat-track > i { display:block; height:100%; background:var(--accent-grad); border-radius:5px; }
    .cat-score { text-align:right; font-weight:700; font-variant-numeric:tabular-nums; }
    .prio-list { list-style:none; padding:0; margin:8px 0 0; display:flex; flex-direction:column; gap:8px; }
    .prio-item { display:flex; gap:11px; align-items:flex-start; padding:10px 12px; background:var(--panel-2); border:1px solid var(--border-soft); border-radius:10px; }
    .prio-sev { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:2px 7px; border-radius:6px; flex-shrink:0; margin-top:1px; }
    .sev-high,.sev-critical,.sev-blocker { background:rgba(251,113,133,.15); color:#fb7185; }
    .sev-medium { background:rgba(251,191,36,.15); color:#fbbf24; }
    .sev-low { background:rgba(153,162,181,.14); color:#aab2c2; }
    .prio-body { font-size:13px; }
    .prio-meta { font-size:11.5px; color:var(--muted-2); margin-top:2px; }
  </style>
</head>
<body>
  {% if user %}
  <header class="topbar">
    <div class="brand"><span class="logo-dot"></span><a href="/sites"><span class="wordmark">Ascend</span></a></div>
    <nav class="nav">
      <a class="navlink" href="/sites">Websites</a>
      <a class="navlink" href="/rules">Rules</a>
      <a class="navlink" href="/approvals">Approvals{% if pending_count is defined and pending_count > 0 %}<span class="pill-count">{{ pending_count }}</span>{% endif %}</a>
      <span class="userchip">{{ user }} &middot; <a href="/logout">Log out</a></span>
    </nav>
  </header>
  {% endif %}
  {% block body %}{% endblock %}
</body>
</html>
